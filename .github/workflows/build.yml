name: Build Windows App

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Build with PyInstaller + auto-package
      # build_cadence.py uses 'libraries bin\' (committed to repo) to bundle
      # ffmpeg/ffprobe, then automatically creates dist\Cadence.zip + .sha256
      run: python build_cadence.py

    - name: Build MSI Installer (For New Users)
      run: |
        heat dir "dist\Cadence" -cg HarvestedComponents -dr INSTALLFOLDER -scom -sreg -srd -var var.SourceDir -gg -out components.wxs
        candle -dSourceDir="dist\Cadence" cadence.wxs components.wxs -ext WixUIExtension
        light -b "dist\Cadence" -out dist\Cadence-Installer.msi cadence.wixobj components.wixobj -ext WixUIExtension -sval

    - name: Upload Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cadence-Windows-Zip
        path: dist\Cadence.zip

    - name: Upload Checksum Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cadence-Windows-Sha256
        path: dist\Cadence.zip.sha256

    - name: Upload MSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cadence-Installer-MSI
        path: dist\Cadence-Installer.msi

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: |
          dist\Cadence.zip
          dist\Cadence.zip.sha256
          dist\Cadence-Installer.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
